name: Build Optimized Windows EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Install only necessary packages in a clean environment
        pip install pyinstaller customtkinter pdfplumber pandas openpyxl pillow

    - name: Build Optimized EXE
      run: |
        pyinstaller --noconsole --onefile `
        --add-data "logo.jpg;." `
        --exclude-module matplotlib `
        --exclude-module scipy `
        --exclude-module notebook `
        --exclude-module IPython `
        --exclude-module jedi `
        --exclude-module PyQt5 `
        --exclude-module PyQt6 `
        --exclude-module PySide2 `
        --exclude-module PySide6 `
        --exclude-module sqlite3 `
        --exclude-module test `
        --exclude-module tkinter.test `
        --name "SANXL" `
        pdf_to_excel.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SANXL_Optimized_EXE
        path: dist/*.exe
